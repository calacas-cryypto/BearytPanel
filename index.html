<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BearYT | Panel de Subida</title>
    <style>
        :root {
            --cafe-principal: #3E2723;
            --azul-principal: #1E5A7A;
            --azul-hover: #2C7A9E;
            --fondo: #F7F4F0;
            --blanco: #FFFFFF;
            --texto: #1A1A1A;
            --borde: #E0D8D0;
            --exito: #2E7D32;
            --error: #C62828;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--fondo); color: var(--texto); }
      .ƁĕâṛŶŧ-auth { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--cafe-principal) 0%, var(--azul-principal) 100%); }
      .auth-card { background: var(--blanco); padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.25); width: 100%; max-width: 400px; }
      .auth-logo { text-align: center; font-size: 2.2rem; font-weight: 700; color: var(--cafe-principal); margin-bottom: 0.5rem; }
      .auth-logo span { color: var(--azul-principal); }
      .auth-subtitle { text-align: center; color: #666; margin-bottom: 2rem; font-size: 0.95rem; }
      .ƁĕâṛŶŧ-panel { display: none; max-width: 900px; margin: 0 auto; padding: 2rem; }
      .ƁĕâṛŶŧ-panel.active { display: block; }
      .panel-header { background: var(--blanco); padding: 1.5rem 2rem; border-radius: 10px; margin-bottom: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
      .panel-title { font-size: 1.6rem; color: var(--cafe-principal); font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
      .btn-logout { background: var(--error); color: var(--blanco); border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-weight: 600; }
      .card { background: var(--blanco); padding: 2rem; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 2rem; }
      .card-title { font-size: 1.2rem; color: var(--cafe-principal); margin-bottom: 1.5rem; font-weight: 700; padding-bottom: 1rem; border-bottom: 2px solid var(--fondo); }
      .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
      .form-group { display: flex; flex-direction: column; }
      .form-group.full-width { grid-column: 1 / -1; }
      .form-label { font-weight: 600; margin-bottom: 0.5rem; color: var(--cafe-principal); font-size: 0.9rem; }
      .form-label span { color: var(--error); }
      .form-input,.form-select,.form-textarea { padding: 0.75rem; border: 1px solid var(--borde); border-radius: 6px; font-size: 0.95rem; font-family: inherit; }
      .form-input:focus,.form-select:focus,.form-textarea:focus { outline: none; border-color: var(--azul-principal); }
      .form-textarea { resize: vertical; min-height: 120px; }
      .form-actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
      .btn { padding: 0.9rem 2rem; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 0.95rem; }
      .btn-primary { background: var(--azul-principal); color: var(--blanco); flex: 1; }
      .btn-primary:hover { background: var(--azul-hover); }
      .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
      .btn-secondary { background: var(--borde); color: var(--texto); }
      .alert { padding: 1rem 1.5rem; border-radius: 6px; margin-bottom: 1.5rem; display: none; font-size: 0.95rem; }
      .alert-success { background: #E8F5E9; color: var(--exito); border-left: 4px solid var(--exito); }
      .alert-error { background: #FFEBEE; color: var(--error); border-left: 4px solid var(--error); }
      .mods-list { display: grid; gap: 1rem; }
      .mod-item { background: var(--fondo); padding: 1.2rem; border-radius: 8px; border: 1px solid var(--borde); display: flex; justify-content: space-between; align-items: center; }
      .mod-info h4 { color: var(--cafe-principal); margin-bottom: 0.3rem; }
      .mod-meta { font-size: 0.85rem; color: #666; }
      .badge { display: inline-block; padding: 0.25rem 0.7rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; margin-left: 0.5rem; }
      .badge-addons { background: #E3F2FD; color: #1565C0; }
      .badge-texturas { background: #F3E5F5; color: #6A1B9A; }
      .badge-dlc { background: #FFF3E0; color: #E65100; }
      .badge-shaders { background: #E8F5E9; color: #2E7D32; }
      .badge-mundos { background: #E0F2F1; color: #00695C; }
      .badge-skins { background: #FCE4EC; color: #C2185B; }
      .btn-delete { background: var(--error); color: var(--blanco); border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
      .preview { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin: 8px 0; display: none; }
      .tabs { display: flex; gap: 8px; margin: 8px 0; }
      .tab { flex: 1; padding: 8px; background: var(--fondo); border: 1px solid var(--borde); color: var(--texto); border-radius: 8px; cursor: pointer; text-align: center; }
      .tab.active { background: var(--azul-principal); color: white; border-color: var(--azul-principal); }
      .warning { background: #FFF3E0; color: #E65100; padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 12px; text-align: center; }
      .upload-progress { background: var(--fondo); border-radius: 10px; height: 8px; margin-top: 10px; overflow: hidden; display: none; }
      .upload-progress-bar { background: var(--azul-principal); height: 100%; width: 0%; transition: 0.3s; }
        @media (max-width: 768px) {.form-grid { grid-template-columns: 1fr; }.panel-header { flex-direction: column; gap: 1rem; } }
    </style>
</head>
<body>
    <div class="ƁĕâṛŶŧ-auth" id="authScreen">
        <div class="auth-card">
            <div class="auth-logo">🐻 Bear<span>YT</span></div>
            <div class="auth-subtitle">Panel de Subida de Contenido</div>
            <form id="authForm">
                <div class="form-group">
                    <label class="form-label">Contraseña de Administrador</label>
                    <input type="password" class="form-input" id="passwordInput" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Github Token</label>
                    <input type="password" class="form-input" id="tokenInput" placeholder="ghp_xxxxx" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Ingresar</button>
                </div>
            </form>
            <div class="alert alert-error" id="authError"></div>
        </div>
    </div>

    <div class="ƁĕâṛŶŧ-panel" id="panel">
        <div class="panel-header">
            <h1 class="panel-title">🐻 BearYT | Subir Mods</h1>
            <button class="btn-logout" id="logoutBtn">Cerrar Sesión</button>
        </div>

        <div class="alert alert-success" id="alertSuccess"></div>
        <div class="alert alert-error" id="alertError"></div>

        <div class="card">
            <h2 class="card-title">Nuevo Contenido</h2>
            <form id="uploadForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Nombre del Mod <span>*</span></label>
                        <input type="text" class="form-input" id="nombre" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Categoría <span>*</span></label>
                        <select class="form-select" id="categoria" required>
                            <option value="">Seleccionar categoría...</option>
                            <option value="Addons">Addons</option>
                            <option value="Texturas">Texturas</option>
                            <option value="Dlc">Dlc</option>
                            <option value="Shaders">Shaders</option>
                            <option value="Mundos">Mundos</option>
                            <option value="Skins">Skins</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Versión <span>*</span></label>
                        <input type="text" class="form-input" id="version" placeholder="v1.0.0" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Badge</label>
                        <select class="form-select" id="badge">
                            <option value="">Sin badge</option>
                            <option value="Nuevo">Nuevo</option>
                            <option value="Popular">Popular</option>
                            <option value="Actualizado">Actualizado</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">Descripción <span>*</span></label>
                        <textarea class="form-textarea" id="descripcion" required></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">Imagen del Mod <span>*</span></label>
                        <div class="warning">⚠️ Comprime las fotos a menos de 500KB pa que cargue volando</div>
                        <div class="tabs">
                            <div class="tab active" onclick="cambiarTab('archivo')">📁 Subir a Github</div>
                            <div class="tab" onclick="cambiarTab('link')">🔗 Pegar Link</div>
                        </div>
                        <div id="tab-archivo">
                            <input type="file" class="form-input" id="imagenArchivo" accept="image/*">
                            <img id="preview" class="preview">
                        </div>
                        <div id="tab-link" style="display:none;">
                            <input type="url" class="form-input" id="imagenLink" placeholder="https://i.imgur.com/ejemplo.png">
                        </div>
                        <div class="upload-progress" id="uploadProgress">
                            <div class="upload-progress-bar" id="uploadProgressBar"></div>
                        </div>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">Link de Descarga <span>*</span></label>
                        <input type="url" class="form-input" id="link" placeholder="https://..." required>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Publicar en BearYT</button>
                    <button type="button" class="btn btn-secondary" id="clearBtn">Limpiar</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2 class="card-title">Mods Publicados Recientemente</h2>
            <div class="mods-list" id="modsList">
                <div style="text-align: center; color: #666; padding: 2rem;">Cargando contenido...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, push, set, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBPdpCA8xnoZUKM1zkbRbiy6GkrkKNW9so",
            authDomain: "bearyt678.firebaseapp.com",
            databaseURL: "https://bearyt678-default-rtdb.firebaseio.com",
            projectId: "bearyt678",
            storageBucket: "bearyt678.firebasestorage.app",
            messagingSenderId: "830162245201",
            appId: "1:830162245201:web:e762ea627f9ee5c1800a70",
            measurementId: "G-SQR9WZ7T79"
        };

        const PANEL_PASSWORD = 'BearYT2026';

        // ===== CONFIG GITHUB BEARYT =====
        const GITHUB_REPO = 'calacas-cryypto/BearYT';
        const GITHUB_FOLDER = 'imagenes';
        let GITHUB_TOKEN = '';

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const ƁĕâṛŶŧ = { db, path: 'bearyt_mods' };

        const authScreen = document.getElementById('authScreen');
        const panel = document.getElementById('panel');
        const authForm = document.getElementById('authForm');
        const authError = document.getElementById('authError');
        const logoutBtn = document.getElementById('logoutBtn');
        const uploadForm = document.getElementById('uploadForm');
        const clearBtn = document.getElementById('clearBtn');
        const submitBtn = document.getElementById('submitBtn');
        let tipoImagen = 'archivo';
        let imagenFile = null;

        if (sessionStorage.getItem('bearyt_panel_auth') === 'true') {
            const savedToken = sessionStorage.getItem('bearyt_token');
            if(savedToken) {
                GITHUB_TOKEN = savedToken;
                mostrarPanel();
            }
        }

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            const token = document.getElementById('tokenInput').value.trim();
            if (password === PANEL_PASSWORD && token.startsWith('ghp_')) {
                GITHUB_TOKEN = token;
                sessionStorage.setItem('bearyt_panel_auth', 'true');
                sessionStorage.setItem('bearyt_token', token);
                mostrarPanel();
            } else {
                authError.textContent = 'Contraseña o Token incorrecto';
                authError.style.display = 'block';
                setTimeout(() => authError.style.display = 'none', 3000);
            }
        });

        function mostrarPanel() {
            authScreen.style.display = 'none';
            panel.classList.add('active');
            ƁĕâṛŶŧ.cargarMods();
        }

        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('bearyt_panel_auth');
            sessionStorage.removeItem('bearyt_token');
            location.reload();
        });

        window.cambiarTab = function(tipo) {
            tipoImagen = tipo;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-archivo').style.display = tipo === 'archivo'? 'block' : 'none';
            document.getElementById('tab-link').style.display = tipo === 'link'? 'block' : 'none';
        }

        document.getElementById('imagenArchivo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                if(file.size > 500000) {
                    alert('Esta foto pesa más de 500KB. Comprimela o usa link');
                    e.target.value = '';
                    return;
                }
                imagenFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        function mostrarExito(msg) {
            const alert = document.getElementById('alertSuccess');
            alert.textContent = msg;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 4000);
        }

        function mostrarError(msg) {
            const alert = document.getElementById('alertError');
            alert.textContent = msg;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 4000);
        }

        async function subirImagenGithub(file) {
            if(!GITHUB_TOKEN) {
                throw new Error('No hay token de Github. Cierra sesión y vuelve a entrar.');
            }

            const fileName = `bearyt_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
            const reader = new FileReader();

            return new Promise((resolve, reject) => {
                reader.onload = async (e) => {
                    const base64 = e.target.result.split(',')[1];

                    document.getElementById('uploadProgress').style.display = 'block';
                    document.getElementById('uploadProgressBar').style.width = '30%';

                    try {
                        const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FOLDER}/${fileName}`, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `token ${GITHUB_TOKEN}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: `Subir imagen BearYT: ${fileName}`,
                                content: base64
                            })
                        });

                        document.getElementById('uploadProgressBar').style.width = '100%';

                        if (response.ok) {
                            const url = `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${GITHUB_FOLDER}/${fileName}`;
                            setTimeout(() => {
                                document.getElementById('uploadProgress').style.display = 'none';
                                document.getElementById('uploadProgressBar').style.width = '0%';
                            }, 500);
                            resolve(url);
                        } else {
                            const error = await response.json();
                            reject(`Error Github: ${error.message}`);
                        }
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        ƁĕâṛŶŧ.cargarMods = function() {
            const modsRef = ref(ƁĕâṛŶŧ.db, ƁĕâṛŶŧ.path);
            onValue(modsRef, (snapshot) => {
                const modsList = document.getElementById('modsList');
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const mods = Object.keys(data).map(key => ({ id: key,...data[key] })).reverse().slice(0, 10);
                    modsList.innerHTML = mods.map(mod => `
                        <div class="mod-item">
                            <div class="mod-info">
                                <h4>${mod.nombre} <span class="badge badge-${mod.categoria.toLowerCase()}">${mod.categoria}</span></h4>
                                <div class="mod-meta">Versión: ${mod.version} | ⬇️ ${mod.descargas || 0}</div>
                            </div>
                            <button class="btn-delete" onclick="ƁĕâṛŶŧ.eliminarMod('${mod.id}')">Eliminar</button>
                        </div>
                    `).join('');
                } else {
                    modsList.innerHTML = '<div style="text-align: center; color: #666; padding: 2rem;">No hay mods publicados aún</div>';
                }
            }, (error) => {
                mostrarError('Error al cargar: ' + error.message);
            });
        };

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Publicando...';

            let imagenUrl = '';

            try {
                if(tipoImagen === 'archivo') {
                    if(!imagenFile) {
                        throw new Error('Selecciona una imagen para subir');
                    }
                    submitBtn.textContent = '⏳ Subiendo imagen a Github...';
                    imagenUrl = await subirImagenGithub(imagenFile);
                } else {
                    imagenUrl = document.getElementById('imagenLink').value;
                    if(!imagenUrl) {
                        throw new Error('Pega el link de la imagen');
                    }
                }

                submitBtn.textContent = '⏳ Guardando en Firebase...';

                const modData = {
                    nombre: document.getElementById('nombre').value,
                    categoria: document.getElementById('categoria').value,
                    version: document.getElementById('version').value,
                    descripcion: document.getElementById('descripcion').value,
                    imagen: imagenUrl,
                    link: document.getElementById('link').value,
                    badge: document.getElementById('badge').value,
                    descargas: 0,
                    valoracion: 5.0,
                    fechaCreacion: Date.now()
                };

                const modsRef = ref(ƁĕâṛŶŧ.db, ƁĕâṛŶŧ.path);
                const newModRef = push(modsRef);
                await set(newModRef, modData);
                mostrarExito('🔥 MOD ACTUALIZADO ÉLITE EN BEARYT 🔥');
                uploadForm.reset();
                document.getElementById('preview').style.display = 'none';
                imagenFile = null;
            } catch (error) {
                mostrarError('Error: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Publicar en BearYT';
                document.getElementById('uploadProgress').style.display = 'none';
            }
        });

        clearBtn.addEventListener('click', () => {
            uploadForm.reset();
            document.getElementById('preview').style.display = 'none';
            imagenFile = null;
        });

        ƁĕâṛŶŧ.eliminarMod = async function(id) {
            if (confirm('¿Eliminar este mod de BearYT?')) {
                try {
                    await remove(ref(ƁĕâṛŶŧ.db, `${ƁĕâṛŶŧ.path}/${id}`));
                    mostrarExito('Mod eliminado correctamente');
                } catch (error) {
                    mostrarError('Error al eliminar: ' + error.message);
                }
            }
        };

        window.ƁĕâṛŶŧ = ƁĕâṛŶŧ;
    </script>
</body>
</html>
